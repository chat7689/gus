<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GUS MACRHODES: NEON TITAN</title>
    <style>
        :root { --neon: #0ff; --accent: #f0f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 30px; left: 30px; pointer-events: none;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .stat-label { font-size: 12px; color: var(--accent); margin-bottom: -5px; }
        .stat-value { font-size: 32px; font-weight: 900; text-shadow: 0 0 15px var(--neon); margin-bottom: 15px; }
        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        h1 { font-size: 80px; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin: 0; }
        button {
            background: none; border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 40px; font-size: 20px; cursor: pointer; transition: 0.3s;
            margin-top: 20px; box-shadow: 0 0 10px var(--neon);
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat-label">GUS MACRHODES // DISTANCE</div>
    <div id="distance" class="stat-value">0m</div>
    <div class="stat-label">VELOCITY MULTIPLIER</div>
    <div id="speed-mult" class="stat-value">1.00x</div>
</div>

<div id="death-screen">
    <div class="stat-label">SYSTEM CRASH</div>
    <h1 id="crash-text">TERMINATED</h1>
    <p id="final-stats">DISTANCE: 0m</p>
    <button onclick="engine.reset()">REBOOT</button>
</div>

<canvas id="stage"></canvas>

<script>
/**
 * GUS MACRHODES: NEON TITAN ENGINE
 * A high-performance Wave-mode implementation
 */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

const engine = {
    active: false,
    width: 0,
    height: 0,
    distance: 0,
    speed: 8,
    baseSpeed: 8,
    difficulty: 1,
    frames: 0,
    hue: 190,

    init() {
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.reset();
        this.render();
    },

    resize() {
        this.width = canvas.width = window.innerWidth;
        this.height = canvas.height = window.innerHeight;
    },

    reset() {
        this.active = true;
        this.distance = 0;
        this.speed = this.baseSpeed;
        this.difficulty = 1;
        this.frames = 0;
        this.hue = 190;
        player.init();
        world.init();
        document.getElementById('death-screen').style.display = 'none';
    },

    die() {
        this.active = false;
        document.getElementById('death-screen').style.display = 'flex';
        document.getElementById('final-stats').innerText = `TOTAL DISTANCE: ${Math.floor(this.distance)}m`;
    },

    update() {
        if (!this.active) return;

        this.frames++;
        // Difficulty Ramping
        this.difficulty = 1 + (this.distance / 5000);
        this.speed = this.baseSpeed * Math.pow(this.difficulty, 0.5);
        
        // Distance increases proportional to current speed
        this.distance += (this.speed / 10);
        this.hue = (190 + (this.distance / 50)) % 360;

        player.update();
        world.update();

        // Update HUD
        document.getElementById('distance').innerText = Math.floor(this.distance) + "m";
        document.getElementById('speed-mult').innerText = (this.speed / this.baseSpeed).toFixed(2) + "x";
    },

    render() {
        this.update();

        // Draw World
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, this.width, this.height);

        world.drawBackground();
        world.drawObstacles();
        player.draw();

        requestAnimationFrame(() => this.render());
    }
};

const player = {
    x: 0,
    y: 0,
    vy: 0,
    isPressing: false,
    size: 10,
    trail: [],
    
    init() {
        this.x = engine.width * 0.2;
        this.y = engine.height / 2;
        this.vy = 0;
        this.trail = [];
    },

    update() {
        const gravity = 0.6 * engine.difficulty;
        const lift = -0.6 * engine.difficulty;
        
        this.vy += this.isPressing ? lift : gravity;
        
        // Speed cap
        const term = 10 * engine.difficulty;
        if(this.vy > term) this.vy = term;
        if(this.vy < -term) this.vy = -term;

        this.y += this.vy;

        // Trail Physics
        this.trail.push({ x: this.x, y: this.y });
        this.trail.forEach(p => p.x -= engine.speed);
        if (this.trail.length > 120) this.trail.shift();

        // Bounds
        if (this.y < 0 || this.y > engine.height) engine.die();
    },

    draw() {
        // Trail
        if (this.trail.length > 2) {
            ctx.beginPath();
            ctx.strokeStyle = `hsl(${engine.hue}, 100%, 70%)`;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${engine.hue}, 100%, 50%)`;
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Arrow
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.atan2(this.vy, engine.speed));
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#fff';
        ctx.beginPath();
        ctx.moveTo(18, 0); ctx.lineTo(-12, -12); ctx.lineTo(-6, 0); ctx.lineTo(-12, 12);
        ctx.fill();
        ctx.restore();
    }
};

const world = {
    obstacles: [],
    lastSpawnX: 0,

    init() {
        this.obstacles = [];
        this.lastSpawnX = engine.width;
        for(let i=0; i<8; i++) this.spawn();
    },

    spawn() {
        const type = Math.random();
        const x = this.lastSpawnX + 400 + (Math.random() * 200);
        
        if (type < 0.4) {
            // Neon Pillars
            const gap = Math.max(180, 350 - (engine.difficulty * 25));
            const topHeight = Math.random() * (engine.height - gap - 100) + 50;
            this.obstacles.push({ type: 'rect', x, w: 80, t: 0, h: topHeight });
            this.obstacles.push({ type: 'rect', x, w: 80, t: topHeight + gap, h: engine.height });
        } else if (type < 0.7) {
            // Neon Orbs (Circles)
            this.obstacles.push({ 
                type: 'circle', 
                x, 
                y: Math.random() * (engine.height - 200) + 100, 
                r: 40 + (Math.random() * 40) 
            });
        } else {
            // Double Diamond
            const mid = engine.height / 2;
            this.obstacles.push({ type: 'circle', x, y: mid - 150, r: 50 });
            this.obstacles.push({ type: 'circle', x, y: mid + 150, r: 50 });
        }
        
        this.lastSpawnX = x;
    },

    update() {
        this.obstacles.forEach(o => {
            o.x -= engine.speed;
            
            // Collision Logic
            if (o.type === 'rect') {
                if (player.x + 8 > o.x && player.x - 8 < o.x + o.w) {
                    if (player.y - 8 < o.h && o.t === 0) engine.die();
                    if (player.y + 8 > o.t && o.t !== 0) engine.die();
                }
            } else if (o.type === 'circle') {
                const dx = player.x - o.x;
                const dy = player.y - o.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < o.r + 8) engine.die();
            }
        });

        if (this.obstacles.length > 0 && this.obstacles[0].x < -200) {
            this.obstacles.shift();
            this.spawn();
        }
    },

    drawBackground() {
        ctx.strokeStyle = `hsla(${engine.hue}, 100%, 50%, 0.05)`;
        const spacing = 100;
        const offset = (engine.distance * 5) % spacing;
        for(let x = -offset; x < engine.width; x += spacing) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, engine.height); ctx.stroke();
        }
    },

    drawObstacles() {
        this.obstacles.forEach(o => {
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${engine.hue}, 100%, 50%)`;
            ctx.strokeStyle = `hsl(${engine.hue}, 100%, 50%)`;
            ctx.lineWidth = 3;
            ctx.fillStyle = '#111';

            if (o.type === 'rect') {
                ctx.fillRect(o.x, o.t, o.w, o.h);
                ctx.strokeRect(o.x, o.t, o.w, o.h);
            } else {
                ctx.beginPath();
                ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        });
        ctx.shadowBlur = 0;
    }
};

// Controls
const handleInput = (s) => player.isPressing = s;
window.addEventListener('mousedown', () => handleInput(true));
window.addEventListener('mouseup', () => handleInput(false));
window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(true) });
window.addEventListener('keyup', (e) => { if(e.code === 'Space') handleInput(false) });
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(true); }, {passive: false});
window.addEventListener('touchend', (e) => { e.preventDefault(); handleInput(false); }, {passive: false});

engine.init();

</script>
</body>
</html>
