<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GUS MACRHODES: ABSOLUTE ZERO</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            text-shadow: 0 0 10px #0ff; pointer-events: none;
        }
        #death-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none;
            background: rgba(0,0,0,0.9); border: 2px solid #f0f; padding: 40px;
            box-shadow: 0 0 50px #f0f; z-index: 100;
        }
        .gus-text { font-size: 12px; letter-spacing: 3px; color: #f0f; }
        #score { font-size: 60px; margin: 0; }
        button { 
            background: transparent; border: 1px solid #0ff; color: #0ff; 
            padding: 10px 20px; cursor: pointer; margin-top: 20px;
        }
        button:hover { background: #0ff; color: #000; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="gus-text">GUS MACRHODES // ENGINE V4.0 // ACTIVE</div>
    <div id="score">0</div>
    <div id="status">STATUS: NORMALIZE</div>
</div>

<div id="death-screen">
    <h1 style="color:#f0f">CRITICAL FAILURE</h1>
    <p>LEVEL PROGRESSION TERMINATED BY GUS MACRHODES</p>
    <button onclick="resetGame()">REINITIALIZE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * GUS MACRHODES: ABSOLUTE ZERO ENGINE
 * ----------------------------------
 * This engine uses a state-based procedural generator.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');
const deathScreen = document.getElementById('death-screen');

let w, h, frames, score, gameActive;
let player, obstacles, particles, cameraShake;
let difficulty, currentSpeed, targetSpeed;

const SETTINGS = {
    baseGravity: 0.5,
    baseLift: -0.5,
    maxVelocity: 9,
    obstacleWidth: 70,
    spawnRate: 400
};

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    
    player = {
        x: w * 0.25,
        y: h / 2,
        vy: 0,
        isPressing: false,
        size: 10,
        trail: []
    };

    obstacles = [];
    particles = [];
    frames = 0;
    score = 0;
    difficulty = 1.0;
    currentSpeed = 7;
    cameraShake = 0;
    gameActive = true;
    deathScreen.style.display = 'none';

    // Pre-generate floor and ceiling
    generateInitialObstacles();
    loop();
}

// --- INPUT HANDLERS ---
const setPress = (val) => player.isPressing = val;
window.onmousedown = () => setPress(true);
window.onmouseup = () => setPress(false);
window.ontouchstart = () => setPress(true);
window.ontouchend = () => setPress(false);
window.onkeydown = (e) => { if(e.code === 'Space') setPress(true); };
window.onkeyup = (e) => { if(e.code === 'Space') setPress(false); };

function spawnObstacle(x) {
    // Advanced Procedural Logic
    // Every 2000 points, it switches between "Wide", "Tight", and "Hallway"
    const mode = Math.floor(score / 2000) % 3;
    let gapHeight, gapCenter;

    if (mode === 0) { // Wide
        gapHeight = Math.max(250, 400 - (difficulty * 20));
        gapCenter = (h/2) + (Math.sin(frames * 0.02) * (h/4));
    } else if (mode === 1) { // Tight ZigZag
        gapHeight = Math.max(180, 300 - (difficulty * 30));
        gapCenter = (h/2) + (Math.sin(frames * 0.05) * (h/3));
        statusEl.innerText = "STATUS: ZIG-ZAG PROTOCOL";
    } else { // The Hallway (Bars)
        gapHeight = 150;
        gapCenter = h/2;
        statusEl.innerText = "STATUS: NARROW HALLWAY";
    }

    obstacles.push({
        x: x,
        w: SETTINGS.obstacleWidth,
        top: gapCenter - (gapHeight / 2),
        bottom: gapCenter + (gapHeight / 2),
        hue: (score / 10) % 360
    });
}

function generateInitialObstacles() {
    for (let i = 0; i < 6; i++) {
        spawnObstacle(w + (i * SETTINGS.spawnRate));
    }
}

function update() {
    frames++;
    score = Math.floor(frames / 5);
    scoreEl.innerText = score;

    // Scaling Difficulty
    difficulty = 1.0 + (score / 1000);
    currentSpeed = 7 + (difficulty * 1.5);

    // Physics
    const accel = player.isPressing ? SETTINGS.baseLift : SETTINGS.baseGravity;
    player.vy += accel * difficulty;
    
    // Terminal Velocity
    if (player.vy > SETTINGS.maxVelocity) player.vy = SETTINGS.maxVelocity;
    if (player.vy < -SETTINGS.maxVelocity) player.vy = -SETTINGS.maxVelocity;
    
    player.y += player.vy;

    // Trail logic (Relative to world movement)
    player.trail.push({ x: player.x, y: player.y });
    player.trail.forEach(p => p.x -= currentSpeed);
    if (player.trail.length > 100) player.trail.shift();

    // Bounds check
    if (player.y < 0 || player.y > h) endGame();

    // Obstacles movement & collision
    obstacles.forEach(o => {
        o.x -= currentSpeed;

        // Collision Check (AABB with buffer)
        if (player.x + 8 > o.x && player.x - 8 < o.x + o.w) {
            if (player.y - 8 < o.top || player.y + 8 > o.bottom) {
                endGame();
            }
        }
    });

    // Cleanup and Respawn
    if (obstacles.length > 0 && obstacles[0].x < -SETTINGS.obstacleWidth) {
        obstacles.shift();
        const lastX = obstacles[obstacles.length - 1].x;
        spawnObstacle(lastX + SETTINGS.spawnRate);
    }
}

function draw() {
    // Background
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, w, h);

    // Grid (Gus MacRhodes style)
    ctx.strokeStyle = `hsla(${(score/5)%360}, 50%, 50%, 0.1)`;
    ctx.lineWidth = 2;
    let offset = (frames * currentSpeed) % 100;
    for (let x = -offset; x < w; x += 100) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }

    // Draw Trail (Neon Wave)
    if (player.trail.length > 2) {
        ctx.beginPath();
        ctx.strokeStyle = '#f0f';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#f0f';
        ctx.moveTo(player.trail[0].x, player.trail[0].y);
        for(let i = 1; i < player.trail.length; i++) {
            ctx.lineTo(player.trail[i].x, player.trail[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Draw Obstacles
    obstacles.forEach(o => {
        const grd = ctx.createLinearGradient(o.x, 0, o.x + o.w, 0);
        grd.addColorStop(0, '#111');
        grd.addColorStop(0.5, '#222');
        grd.addColorStop(1, '#111');
        
        ctx.fillStyle = grd;
        ctx.strokeStyle = `hsl(${o.hue}, 100%, 50%)`;
        ctx.lineWidth = 3;

        // Top Block
        ctx.fillRect(o.x, 0, o.w, o.top);
        ctx.strokeRect(o.x, -10, o.w, o.top + 10);

        // Bottom Block
        ctx.fillRect(o.x, o.bottom, o.w, h - o.bottom);
        ctx.strokeRect(o.x, o.bottom, o.w, h - o.bottom + 10);
        
        // Add "Triangles" inside
        ctx.fillStyle = `hsla(${o.hue}, 100%, 50%, 0.2)`;
        ctx.beginPath();
        ctx.moveTo(o.x, o.top); ctx.lineTo(o.x + o.w/2, o.top - 30); ctx.lineTo(o.x + o.w, o.top);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(o.x, o.bottom); ctx.lineTo(o.x + o.w/2, o.bottom + 30); ctx.lineTo(o.x + o.w, o.bottom);
        ctx.fill();
    });

    // Draw Player (The Arrow)
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(Math.atan2(player.vy, currentSpeed));
    
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#0ff';
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(-15, -15);
    ctx.lineTo(-15, 15);
    ctx.fill();
    ctx.restore();
}

function endGame() {
    gameActive = false;
    deathScreen.style.display = 'block';
}

function resetGame() {
    init();
}

function loop() {
    if (!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

// Start Engine
window.onload = init;
window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };

</script>
</body>
</html>
