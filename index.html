<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUS MACRHODES: APEX</title>
    <style>
        :root { --neon: #00e5ff; --accent: #ff0055; --bg: #050508; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        .hud-top { display: flex; gap: 20px; }
        .hud-box { background: rgba(0,0,0,0.6); border-left: 4px solid var(--neon); padding: 10px 20px; text-transform: uppercase; }
        .hud-lbl { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
        .hud-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 10px currentColor; }
        
        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        h1 { font-size: 60px; margin: 0; text-shadow: 0 0 20px currentColor; letter-spacing: 5px; text-transform: uppercase; }
        p { font-size: 18px; color: #aaa; letter-spacing: 2px; }
        
        button { pointer-events: auto; background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 40px; font-size: 20px; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.2s; letter-spacing: 2px; margin-top: 20px; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="hud-top">
        <div class="hud-box" style="border-color: var(--neon);">
            <div class="hud-lbl">DISTANCE</div>
            <div id="dist-display" class="hud-val" style="color: var(--neon);">0M</div>
        </div>
        <div class="hud-box" style="border-color: var(--accent);">
            <div class="hud-lbl">SECTOR</div>
            <div id="biome-display" class="hud-val" style="color: var(--accent);">NEON GATES</div>
        </div>
    </div>
</div>

<div id="screens">
    <h1 id="screen-title" style="color: var(--neon);">GUS MACRHODES</h1>
    <p id="screen-sub">SYSTEM INITIALIZED</p>
    <button id="start-btn">ENGAGE THRUSTERS</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const screens = document.getElementById('screens');
const screenTitle = document.getElementById('screen-title');
const screenSub = document.getElementById('screen-sub');
const startBtn = document.getElementById('start-btn');
const distDisplay = document.getElementById('dist-display');
const biomeDisplay = document.getElementById('biome-display');

let W, H;
let frame = 0;
let state = 'START'; 

const BIOMES = [
    { name: "NEON GATES", color: '#00e5ff', type: 'gap' },
    { name: "ORBITAL CLUSTER", color: '#00ff66', type: 'circle' },
    { name: "GEOMETRIC TRENCH", color: '#ffaa00', type: 'triangle' },
    { name: "GRAVITY FLUX", color: '#b200ff', type: 'portal' }
];

let game = { speed: 8, distance: 0, biomeIdx: 0, nextSpawnX: 0 };

// --- PARTICLES ---
const particles = [];
function spawnParticles(x, y, color, count, speed, isExplosion = false) {
    for(let i=0; i<count; i++) {
        if (particles.length > 300) particles.shift(); 
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * speed * (isExplosion ? 2 : 1) - (isExplosion ? 0 : game.speed * 0.5),
            vy: (Math.random() - 0.5) * speed,
            life: 1.0, decay: 0.02 + Math.random() * 0.03, color, size: Math.random() * 3 + 1
        });
    }
}

function drawParticles() {
    ctx.globalCompositeOperation = 'lighter';
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= p.decay;
        if(p.life <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    ctx.globalAlpha = 1.0; ctx.globalCompositeOperation = 'source-over';
}

// --- PLAYER ---
const player = {
    x: 0, y: 0, vy: 0, size: 10, pressing: false, gravDir: 1, trail: [],
    
    reset() {
        this.x = W * 0.2; this.y = H / 2; this.vy = 0;
        this.gravDir = 1; this.trail = []; this.pressing = false;
    },
    
    update() {
        const force = 0.8;
        this.vy += this.pressing ? (-force * this.gravDir) : (force * this.gravDir);
        
        if (this.vy > 12) this.vy = 12; if (this.vy < -12) this.vy = -12;
        this.y += this.vy;

        this.trail.push({ x: this.x, y: this.y });
        for(let i=0; i<this.trail.length; i++) this.trail[i].x -= game.speed;
        if (this.trail.length > 100) this.trail.shift();

        if (frame % 3 === 0) spawnParticles(this.x - 10, this.y, '#fff', 2, 4, false);
        if (this.y < 0 || this.y > H) die();
    },
    
    draw() {
        const pCol = this.gravDir === 1 ? BIOMES[game.biomeIdx].color : '#b200ff';

        if (this.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = pCol; ctx.lineWidth = 3;
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.stroke();
        }

        ctx.save(); ctx.translate(this.x, this.y); ctx.scale(1, this.gravDir);
        ctx.rotate(Math.atan2(this.vy * this.gravDir, game.speed));
        
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = pCol;
        ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(-10, -10); ctx.lineTo(-5, 0); ctx.lineTo(-10, 10); ctx.fill();
        ctx.restore();
    }
};

// --- OBSTACLES ---
let obstacles = [];

function spawnObstacles() {
    // THIS is the key fix. It will loop and continually generate obstacles until the buffer ahead of the player is full.
    while (game.nextSpawnX < W + 400) {
        const biome = BIOMES[game.biomeIdx];
        const gapY = 150 + Math.random() * (H - 300); 
        const x = game.nextSpawnX;

        if (biome.type === 'gap') {
            obstacles.push({ type: 'rect', x: x, y: 0, w: 60, h: gapY - 100 }); 
            obstacles.push({ type: 'rect', x: x, y: gapY + 100, w: 60, h: H }); 
        } 
        else if (biome.type === 'circle') {
            obstacles.push({ type: 'circle', x: x, y: gapY, r: 50 });
            if (Math.random() > 0.5) obstacles.push({ type: 'circle', x: x + 100, y: gapY + (Math.random()*200-100), r: 30 });
        }
        else if (biome.type === 'triangle') {
            obstacles.push({ type: 'tri', x: x, y: gapY, r: 70, angle: Math.random() * Math.PI, spin: 0.05 });
        }
        else if (biome.type === 'portal') {
            obstacles.push({ type: 'portal', x: x, y: gapY, r: 60, used: false });
            obstacles.push({ type: 'rect', x: x, y: 0, w: 40, h: gapY - 100 }); 
            obstacles.push({ type: 'rect', x: x, y: gapY + 100, w: 40, h: H });
        }

        let spacing = Math.max(250, 600 - (game.distance * 0.1));
        game.nextSpawnX += spacing;
    }
}

function updateAndDrawObstacles() {
    const col = BIOMES[game.biomeIdx].color;
    ctx.strokeStyle = col; ctx.fillStyle = '#0a0a0f'; ctx.lineWidth = 4;
    ctx.shadowBlur = 10; ctx.shadowColor = col;

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= game.speed;

        if (o.type === 'rect') {
            ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h);
            if (player.x + player.size > o.x && player.x - player.size < o.x + o.w &&
                player.y + player.size > o.y && player.y - player.size < o.y + o.h) { die(); }
        } 
        else if (o.type === 'circle') {
            ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + player.size) die();
        }
        else if (o.type === 'tri') {
            o.angle += o.spin;
            ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.angle);
            ctx.beginPath(); ctx.moveTo(0, -o.r); ctx.lineTo(o.r*0.866, o.r*0.5); ctx.lineTo(-o.r*0.866, o.r*0.5); ctx.closePath();
            ctx.fill(); ctx.stroke(); ctx.restore();
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r * 0.7 + player.size) die();
        }
        else if (o.type === 'portal') {
            ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(frame * 0.05);
            ctx.strokeStyle = '#b200ff'; ctx.shadowColor = '#b200ff';
            ctx.beginPath(); ctx.arc(0,0, o.r, 0, Math.PI*2); ctx.stroke();
            ctx.restore();

            if (!o.used && Math.hypot(player.x - o.x, player.y - o.y) < o.r) {
                o.used = true; player.gravDir *= -1; 
                spawnParticles(o.x, o.y, '#b200ff', 50, 15, true);
            }
        }

        if (o.x < -200) obstacles.splice(i, 1);
    }
    ctx.shadowBlur = 0; 
}

// --- GAME FLOW ---
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);

function initGame() {
    state = 'PLAY'; screens.style.display = 'none';
    game.speed = 8; game.distance = 0; game.biomeIdx = 0; game.nextSpawnX = W; 
    obstacles = []; particles.length = 0; player.reset(); updateUI();
}

function die() {
    if (state === 'DEAD') return;
    state = 'DEAD';
    spawnParticles(player.x, player.y, '#ff0055', 100, 20, true);
    screens.style.display = 'flex'; screenTitle.innerText = "HULL BREACH"; screenTitle.style.color = "var(--accent)";
    screenSub.innerText = `FINAL DISTANCE: ${Math.floor(game.distance)}M`; startBtn.innerText = "REBOOT SYSTEM";
}

function updateUI() {
    distDisplay.innerText = Math.floor(game.distance) + "M";
    biomeDisplay.innerText = BIOMES[game.biomeIdx].name;
    biomeDisplay.style.color = BIOMES[game.biomeIdx].color;
}

// --- MAIN LOOP ---
function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = 'var(--bg)'; ctx.fillRect(0, 0, W, H);

    if (state === 'PLAY') {
        frame++;
        game.speed = 8 + (game.distance / 1000); 
        game.distance += game.speed / 10;
        
        // This makes sure the spawner moves backwards with the screen
        game.nextSpawnX -= game.speed; 
        
        let currentTargetBiome = Math.floor(game.distance / 2000) % BIOMES.length;
        if (currentTargetBiome !== game.biomeIdx) {
            game.biomeIdx = currentTargetBiome;
            game.nextSpawnX += W * 0.8; // Create a safe gap for the biome transition
            spawnParticles(W/2, H/2, BIOMES[game.biomeIdx].color, 50, 20, true);
        }

        ctx.strokeStyle = BIOMES[game.biomeIdx].color; ctx.globalAlpha = 0.1;
        let offset = (frame * (game.speed * 0.5)) % 100;
        for(let x = -offset; x < W; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        ctx.globalAlpha = 1.0;

        spawnObstacles();
        updateAndDrawObstacles();
        player.update();
        player.draw();
        
        if (frame % 10 === 0) updateUI();
    }
    
    drawParticles();
}

// --- CONTROLS ---
const setPress = (v) => { if(state === 'PLAY') player.pressing = v; };
window.addEventListener('mousedown', () => setPress(true)); window.addEventListener('mouseup', () => setPress(false));
window.addEventListener('keydown', (e) => { if(e.code === 'Space') setPress(true); });
window.addEventListener('keyup', (e) => { if(e.code === 'Space') setPress(false); });
window.addEventListener('touchstart', (e) => { e.preventDefault(); setPress(true); }, {passive: false});
window.addEventListener('touchend', (e) => { e.preventDefault(); setPress(false); }, {passive: false});
startBtn.addEventListener('click', initGame);

// --- START ---
resize();
loop();

</script>
</body>
</html>
