<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GUS MACRHODES: LONG HAUL</title>
    <style>
        :root { --neon: #00e5ff; --accent: #ff0055; --bg: #020204; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; user-select: none; }
        canvas { display: block; position: absolute; z-index: 1; top: 0; left: 0; }
        
        #hud { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; display: flex; gap: 20px; }
        .hud-box { background: rgba(0, 0, 0, 0.4); border-left: 3px solid var(--neon); padding: 10px 20px; backdrop-filter: blur(5px); }
        .hud-lbl { font-size: 10px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
        .hud-val { font-size: 28px; font-weight: 900; text-shadow: 0 0 10px var(--neon); letter-spacing: 1px; }
        
        #announce { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0; transition: opacity 0.3s; z-index: 20; pointer-events: none; }
        #announce h2 { font-size: 50px; margin: 0; color: white; text-shadow: 0 0 20px var(--neon); letter-spacing: 10px; font-weight: 900; text-transform: uppercase; }
        
        #death { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-top: 5px solid var(--accent); border-bottom: 5px solid var(--accent); }
        #death h1 { font-size: 70px; color: var(--accent); margin: 0; text-shadow: 0 0 30px var(--accent); letter-spacing: 5px; text-transform: uppercase; }
        button { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 40px; font-size: 20px; cursor: pointer; transition: 0.2s; font-weight: bold; letter-spacing: 2px; margin-top: 30px; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

<div id="hud">
    <div class="hud-box">
        <div class="hud-lbl">DISTANCE</div>
        <div id="ui-dist" class="hud-val" style="color: var(--neon);">0m</div>
    </div>
    <div class="hud-box" style="border-color: var(--accent);">
        <div class="hud-lbl">SECTOR</div>
        <div id="ui-biome" class="hud-val" style="color: var(--accent); text-shadow: 0 0 10px var(--accent);">NEON GATES</div>
    </div>
</div>

<div id="announce"><h2 id="announce-txt">SECTOR REACHED</h2></div>

<div id="death">
    <div class="hud-lbl" style="font-size: 16px; color: #aaa;">GUS MACRHODES // CRITICAL OVERLOAD</div>
    <h1>HULL DESTROYED</h1>
    <div id="final-stats" class="hud-val" style="margin-top: 10px; color: white; text-shadow: none;">0m</div>
    <button onclick="engine.reset()">INITIALIZE REBOOT</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });

const BIOMES = [
    { name: "NEON GATES", type: 'pillars', color: '#00e5ff', bg: 'lines' },
    { name: "ORBITAL CLUSTER", type: 'circles', color: '#00ff66', bg: 'dots' },
    { name: "GEOMETRIC TRENCH", type: 'triangles', color: '#ffaa00', bg: 'zigzag' },
    { name: "SAWBLADE ALLEY", type: 'saws', color: '#ff0055', bg: 'pulse' },
    { name: "GRAVITY FLUX", type: 'portals', color: '#b200ff', bg: 'grid' }
];

const particles = [];
function spawnParticles(x, y, color, count, speed, type = 'spark') {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * speed * (type === 'explode' ? 2 : 1) - (type === 'spark' ? engine.speed * 0.8 : 0),
            vy: (Math.random() - 0.5) * speed,
            life: 1.0,
            decay: type === 'dust' ? 0.005 : (0.02 + Math.random() * 0.04),
            color: color,
            size: type === 'dust' ? Math.random() * 2 : Math.random() * 4 + 1
        });
    }
    if (particles.length > 500) particles.splice(0, particles.length - 500); 
}

function updateParticles() {
    ctx.globalCompositeOperation = 'lighter';
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= p.decay;
        if(p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1.0;
    ctx.globalCompositeOperation = 'source-over';
}

const player = {
    x: 0, y: 0, vy: 0, size: 8,
    isPressing: false, gravDir: 1, trail: [],
    
    init() {
        this.x = engine.w * 0.25; this.y = engine.h / 2; this.vy = 0;
        this.gravDir = 1; this.trail = [];
    },
    update() {
        // Starts softer at 0.8, grows tighter/snappier as difficulty increases
        const force = 0.8 + (engine.difficulty * 0.4);
        
        this.vy += this.isPressing ? (-force * this.gravDir) : (force * this.gravDir);
        
        const term = 10 + (engine.difficulty * 2); 
        if(this.vy > term) this.vy = term; if(this.vy < -term) this.vy = -term;
        this.y += this.vy;

        this.trail.push({ x: this.x, y: this.y });
        this.trail.forEach(p => p.x -= engine.speed);
        if (this.trail.length > 40) this.trail.shift();
        
        if(engine.frames % 2 === 0) spawnParticles(this.x - 10, this.y, '#fff', 2, 3, 'spark');
        if (this.y < 0 || this.y > engine.h) engine.die();
    },
    draw() {
        const pCol = this.gravDir === 1 ? BIOMES[engine.biomeIdx].color : '#b200ff';
        
        if (this.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = pCol; ctx.lineWidth = 4;
            ctx.shadowBlur = 15; ctx.shadowColor = pCol;
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.stroke(); ctx.shadowBlur = 0;
        }

        ctx.save(); ctx.translate(this.x, this.y); ctx.scale(1, this.gravDir);
        ctx.rotate(Math.atan2(this.vy * this.gravDir, engine.speed));
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-10, -12); ctx.lineTo(-4, 0); ctx.lineTo(-10, 12); ctx.fill();
        ctx.restore();
    }
};

const world = {
    obs: [], lastX: 0, lastSafeY: 0,
    
    init() {
        this.obs = [];
        this.lastX = engine.w;
        this.lastSafeY = engine.h / 2;
        this.spawn(8); 
    },

    spawn(count = 1) {
        if (engine.transitioning) return; 

        for(let i=0; i<count; i++) {
            const b = BIOMES[engine.biomeIdx];
            
            // Progressive Difficulty: Objects get closer together over time
            const gapDist = Math.max(180, 550 - (engine.difficulty * 80));
            const x = this.lastX + gapDist;

            // Playability Governor (ensures the gap is physically reachable)
            const timeToReach = (x - this.lastX) / engine.speed;
            const maxTravel = timeToReach * (10 + engine.difficulty); 
            const minSafe = Math.max(120, this.lastSafeY - maxTravel);
            const maxSafe = Math.min(engine.h - 120, this.lastSafeY + maxTravel);
            const targetY = minSafe + Math.random() * (maxSafe - minSafe);
            this.lastSafeY = targetY;

            let type = b.type;
            if (type === 'pillars') {
                // Progressive Difficulty: The gap shrinks from 300px down to 120px
                const pass = Math.max(120, 350 - (engine.difficulty * 50));
                this.obs.push({ type: 'rect', x, w: 50, y: 0, h: targetY - (pass/2) });
                this.obs.push({ type: 'rect', x, w: 50, y: targetY + (pass/2), h: engine.h });
            } 
            else if (type === 'circles') {
                this.obs.push({ type: 'circle', x, y: targetY, r: 40 + Math.random()*30 });
                if(Math.random() > 0.4) this.obs.push({ type: 'circle', x: x+100, y: targetY + (Math.random()*160-80), r: 35 });
            } 
            else if (type === 'saws') {
                this.obs.push({ type: 'saw', x, y: targetY, r: 60, angle: 0 });
            }
            else if (type === 'triangles') {
                // Progressive Difficulty: Triangles spin faster
                const spinSpd = (Math.random()>0.5?1:-1) * (0.04 + (engine.difficulty * 0.01));
                this.obs.push({ type: 'tri', x, y: targetY, r: 65, angle: Math.random() * Math.PI, spin: spinSpd });
            }
            else if (type === 'portals') {
                this.obs.push({ type: 'portal', x, y: targetY, r: 50, targetDir: player.gravDir === 1 ? -1 : 1, used: false });
                this.obs.push({ type: 'rect', x: x, w: 40, y: 0, h: targetY - 100 });
                this.obs.push({ type: 'rect', x: x, w: 40, y: targetY + 100, h: engine.h });
            }
            this.lastX = x;
        }
    },

    updateAndDraw() {
        const bCol = BIOMES[engine.biomeIdx].color;
        ctx.shadowBlur = 15;
        
        for (let i = this.obs.length - 1; i >= 0; i--) {
            let o = this.obs[i];
            o.x -= engine.speed;

            if (o.type === 'tri' || o.type === 'saw') o.angle += (o.spin || 0.1);

            ctx.shadowColor = bCol; ctx.strokeStyle = bCol; ctx.fillStyle = '#08080a';
            ctx.lineWidth = 3;

            if (o.type === 'rect') {
                ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h);
                if (player.x + player.size > o.x && player.x - player.size < o.x + o.w) {
                    if (player.y - player.size < o.y + o.h && player.y + player.size > o.y) engine.die();
                }
            } 
            else if (o.type === 'circle') {
                ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + player.size) engine.die();
            } 
            else if (o.type === 'saw') {
                ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.angle);
                ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                for(let t=0; t<8; t++) { ctx.rotate(Math.PI / 4); ctx.beginPath(); ctx.moveTo(o.r, -10); ctx.lineTo(o.r+15, 0); ctx.lineTo(o.r, 10); ctx.stroke(); }
                ctx.restore();
                if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + player.size) engine.die();
            }
            else if (o.type === 'tri') {
                ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.angle);
                ctx.beginPath(); ctx.moveTo(0, -o.r); ctx.lineTo(o.r * 0.866, o.r * 0.5); ctx.lineTo(-o.r * 0.866, o.r * 0.5); ctx.closePath();
                ctx.fill(); ctx.stroke(); ctx.restore();
                if (Math.hypot(player.x - o.x, player.y - o.y) < o.r * 0.8 + player.size) engine.die();
            }
            else if (o.type === 'portal') {
                const pCol = o.targetDir === -1 ? '#b200ff' : '#00e5ff';
                ctx.save(); ctx.translate(o.x, o.y);
                ctx.strokeStyle = pCol; ctx.shadowColor = pCol; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = pCol; const dir = o.targetDir === -1 ? -1 : 1;
                ctx.beginPath(); ctx.moveTo(-15, -10*dir); ctx.lineTo(15, -10*dir); ctx.lineTo(0, 20*dir); ctx.fill();
                ctx.restore();

                if (!o.used && Math.hypot(player.x - o.x, player.y - o.y) < o.r + player.size) {
                    o.used = true; player.gravDir = o.targetDir;
                    spawnParticles(o.x, o.y, pCol, 60, 10, 'explode');
                }
            }

            if (o.x < -200) this.obs.splice(i, 1);
        }
        ctx.shadowBlur = 0;

        if (!engine.transitioning && this.lastX - player.x < engine.w + 400) {
            this.spawn();
        }
    },
    
    drawBackground() {
        const bg = BIOMES[engine.biomeIdx].bg;
        const col = BIOMES[engine.biomeIdx].color;
        ctx.strokeStyle = col; ctx.globalAlpha = 0.1; ctx.lineWidth = 1;
        
        let offset = (engine.frames * (engine.speed*0.5)) % 100;
        
        if (bg === 'lines') {
            for(let x = -offset; x < engine.w; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, engine.h); ctx.stroke(); }
        } else if (bg === 'dots') {
            for(let x = -offset; x < engine.w; x += 80) {
                for(let y = 0; y < engine.h; y += 80) { ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill(); }
            }
        } else if (bg === 'zigzag') {
            ctx.beginPath();
            for(let x = -offset; x < engine.w; x += 150) { ctx.moveTo(x, 0); ctx.lineTo(x+75, engine.h/2); ctx.lineTo(x, engine.h); }
            ctx.stroke();
        } else if (bg === 'pulse') {
            ctx.fillStyle = col; ctx.globalAlpha = 0.02 + Math.sin(engine.frames * 0.05) * 0.02;
            ctx.fillRect(0,0,engine.w,engine.h); ctx.globalAlpha = 0.1;
        } else if (bg === 'grid') {
            for(let x = -offset; x < engine.w; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, engine.h); ctx.stroke(); }
            let yOff = (engine.frames * (engine.speed*0.5)) % 80;
            for(let y = -yOff; y < engine.h; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(engine.w, y); ctx.stroke(); }
        }
        ctx.globalAlpha = 1.0;
    }
};

const engine = {
    w: 0, h: 0, active: false, frames: 0,
    distance: 0, speed: 7, baseSpeed: 7, difficulty: 1,
    biomeIdx: 0, transitioning: false, lastBiomeDist: 0,

    init() {
        this.resize(); window.addEventListener('resize', () => this.resize());
        this.reset(); this.loop();
    },
    resize() { this.w = canvas.width = window.innerWidth; this.h = canvas.height = window.innerHeight; },
    
    reset() {
        this.active = true; this.frames = 0; this.distance = 0; this.lastBiomeDist = 0;
        this.speed = this.baseSpeed; this.difficulty = 1; this.biomeIdx = 0;
        this.transitioning = false; particles.length = 0;
        
        player.init(); world.init();
        document.getElementById('death').style.display = 'none';
        this.updateUI(); this.announce();
    },
    
    die() {
        this.active = false;
        spawnParticles(player.x, player.y, '#ff0055', 150, 20, 'explode'); 
        ctx.fillStyle = 'var(--bg)'; ctx.fillRect(0,0,this.w,this.h);
        world.updateAndDraw(); updateParticles();
        document.getElementById('final-stats').innerText = Math.floor(this.distance) + "m";
        document.getElementById('death').style.display = 'flex';
    },

    triggerTransition() {
        this.transitioning = true;
        this.biomeIdx = (this.biomeIdx + 1) % BIOMES.length;
        world.lastX = player.x + this.w; 
        
        this.announce();
        this.updateUI();
        
        for(let i=0; i<100; i++) spawnParticles(this.w, Math.random()*this.h, BIOMES[this.biomeIdx].color, 1, 15, 'dust');

        setTimeout(() => { 
            if(this.active) {
                this.transitioning = false; 
                world.lastX = this.w; 
                world.spawn(3); 
            }
        }, 1500);
    },

    announce() {
        const el = document.getElementById('announce-txt');
        const b = BIOMES[this.biomeIdx];
        el.innerText = b.name; el.style.color = b.color; el.style.textShadow = `0 0 20px ${b.color}`;
        const box = document.getElementById('announce');
        box.style.opacity = '1';
        setTimeout(() => box.style.opacity = '0', 2000);
    },
    
    updateUI() {
        document.getElementById('ui-dist').innerText = Math.floor(this.distance) + "m";
        const bBox = document.getElementById('ui-biome');
        bBox.innerText = BIOMES[this.biomeIdx].name;
        bBox.style.color = BIOMES[this.biomeIdx].color;
        bBox.style.textShadow = `0 0 10px ${BIOMES[this.biomeIdx].color}`;
    },

    loop() {
        if (this.active) {
            this.frames++;
            // Scales much slower now to account for massive 4500m biomes
            this.difficulty = 1 + (this.distance / 5000); 
            this.speed = this.baseSpeed * Math.pow(this.difficulty, 0.5); 
            this.distance += (this.speed / 10);

            if(this.frames % 5 === 0) spawnParticles(this.w + 10, Math.random()*this.h, '#fff', 1, 5, 'dust');

            // 15x LONGER BIOMES (4,500 METERS)
            if (!this.transitioning && this.distance - this.lastBiomeDist > 4500) {
                this.lastBiomeDist = this.distance;
                this.triggerTransition();
            }

            player.update();
            this.updateUI();

            ctx.fillStyle = '#020204'; ctx.fillRect(0, 0, this.w, this.h);
            
            world.drawBackground();
            world.updateAndDraw();
            player.draw();
            updateParticles();
        }
        requestAnimationFrame(() => this.loop());
    }
};

const setPress = (v) => player.isPressing = v;
window.onmousedown = () => setPress(true); window.onmouseup = () => setPress(false);
window.onkeydown = (e) => { if(e.code === 'Space') setPress(true); };
window.onkeyup = (e) => { if(e.code === 'Space') setPress(false); };
window.ontouchstart = (e) => { e.preventDefault(); setPress(true); };
window.ontouchend = (e) => { e.preventDefault(); setPress(false); };

engine.init();
</script>
</body>
</html>
