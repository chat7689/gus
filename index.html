<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gus MacRhodes: EXTREME WAVE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --bg-dark: #050508;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .stats {
            position: absolute;
            top: 20px; left: 20px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }
        #score-val { font-size: 50px; font-weight: 900; }
        .gus-tag { font-size: 14px; letter-spacing: 5px; opacity: 0.8; }
        
        #death-screen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 50px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
            z-index: 100;
        }
        button {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats">
        <div class="gus-tag">GUS MACRHODES // PROTOCOL</div>
        <div id="score-val">0000</div>
        <div id="diff-meter" style="font-size: 12px; color: var(--neon-pink);">DIFFICULTY: 1.0x</div>
    </div>
</div>

<div id="death-screen">
    <h1 style="color: var(--neon-pink); font-size: 40px; margin-bottom: 10px;">SIGNAL LOST</h1>
    <p style="color: white; margin-bottom: 30px;">The wave collapsed. Gus MacRhodes expects more.</p>
    <button onclick="reset()">REBOOT SYSTEM</button>
</div>

<canvas id="c"></canvas>

<script>
/**
 * GUS MACRHODES: NEON WAVE ENGINE (HARD MODE)
 * Features:
 * - Exponential Speed Scaling
 * - Gap Contraction (Difficulty spikes)
 * - Precision Hitbox Geometry
 * - Independent Physics-based Neon Trail
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-val');
const diffEl = document.getElementById('diff-meter');
const deathScreen = document.getElementById('death-screen');

let width, height;
let frames = 0;
let gameActive = true;

// Player Settings
let player = {
    x: 0,
    y: 0,
    vy: 0,
    angle: 0,
    isPressing: false,
    trail: [],
    size: 12 // Small hitbox for precision
};

// Physics/Game State
let scrollX = 0;
let baseSpeed = 7;
let currentSpeed = 7;
let gravity = 0.55;
let lift = -0.55;
let obstacles = [];
let difficulty = 1.0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    player.x = width * 0.2;
    player.y = height / 2;
}

window.addEventListener('resize', resize);
window.addEventListener('mousedown', () => player.isPressing = true);
window.addEventListener('mouseup', () => player.isPressing = false);
window.addEventListener('keydown', (e) => { if(e.code === 'Space') player.isPressing = true; });
window.addEventListener('keyup', (e) => { if(e.code === 'Space') player.isPressing = false; });

function spawnObstacle(xPos) {
    // Progressively smaller gaps
    const minGap = Math.max(160, 350 - (difficulty * 25));
    const gapTop = Math.random() * (height - minGap - 100) + 50;
    
    obstacles.push({
        x: xPos,
        w: 80,
        gapTop: gapTop,
        gapBottom: gapTop + minGap,
        passed: false
    });
}

function initLevel() {
    obstacles = [];
    for(let i = 0; i < 5; i++) {
        spawnObstacle(width + (i * 450));
    }
}

function reset() {
    player.y = height / 2;
    player.vy = 0;
    player.trail = [];
    frames = 0;
    difficulty = 1.0;
    currentSpeed = baseSpeed;
    gameActive = true;
    deathScreen.style.display = 'none';
    initLevel();
    loop();
}

function loop() {
    if(!gameActive) return;

    frames++;
    // Exponential Difficulty Scaling
    difficulty = 1.0 + (frames / 1500);
    currentSpeed = baseSpeed * Math.pow(difficulty, 0.4);
    diffEl.innerText = `DIFFICULTY: ${difficulty.toFixed(2)}x`;
    scoreEl.innerText = Math.floor(frames / 10).toString().padStart(4, '0');

    // Movement Physics
    if(player.isPressing) {
        player.vy += lift * difficulty;
    } else {
        player.vy += gravity * difficulty;
    }
    
    // Clamp vertical velocity to prevent "teleporting" through walls
    const maxV = 12 * difficulty;
    player.vy = Math.max(-maxV, Math.min(maxV, player.vy));
    player.y += player.vy;

    // Trail logic: Pushes points back relative to speed
    player.trail.push({ x: player.x, y: player.y });
    for(let p of player.trail) {
        p.x -= currentSpeed;
    }
    if(player.trail.length > 150) player.trail.shift();

    // Obstacle Logic
    obstacles.forEach(ob => {
        ob.x -= currentSpeed;
        
        // Accurate Triangle/Box Collision
        if (player.x + player.size > ob.x && player.x - player.size < ob.x + ob.w) {
            if (player.y - player.size < ob.gapTop || player.y + player.size > ob.gapBottom) {
                gameOver();
            }
        }
    });

    // Recycle Obstacles
    if(obstacles[0].x < -100) {
        obstacles.shift();
        spawnObstacle(obstacles[obstacles.length-1].x + 450);
    }

    // Ceiling/Floor Death
    if(player.y < 0 || player.y > height) gameOver();

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    // Background Pulse
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, width, height);
    
    // Moving Grid
    ctx.strokeStyle = `rgba(0, 242, 255, ${0.05 + (difficulty * 0.02)})`;
    ctx.lineWidth = 1;
    let gridOffset = (frames * currentSpeed) % 100;
    for(let x = -gridOffset; x < width; x += 100) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }

    // Draw Neon Trail
    if(player.trail.length > 2) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--neon-pink');
        ctx.strokeStyle = varColor('--neon-pink');
        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(player.trail[0].x, player.trail[0].y);
        for(let i = 1; i < player.trail.length; i++) {
            ctx.lineTo(player.trail[i].x, player.trail[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Draw Obstacles (The Tunnels)
    obstacles.forEach(ob => {
        ctx.fillStyle = '#11111a';
        ctx.strokeStyle = varColor('--neon-blue');
        ctx.lineWidth = 3;
        
        // Top Wall
        ctx.fillRect(ob.x, 0, ob.w, ob.gapTop);
        ctx.strokeRect(ob.x, 0, ob.w, ob.gapTop);
        
        // Bottom Wall
        ctx.fillRect(ob.x, ob.gapBottom, ob.w, height - ob.gapBottom);
        ctx.strokeRect(ob.x, ob.gapBottom, ob.w, height - ob.gapBottom);

        // Add "Triangles" inside walls for aesthetic
        ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.beginPath();
        ctx.moveTo(ob.x, ob.gapTop);
        ctx.lineTo(ob.x + ob.w/2, ob.gapTop - 40);
        ctx.lineTo(ob.x + ob.w, ob.gapTop);
        ctx.fill();
    });

    // Draw Player Arrow
    ctx.save();
    ctx.translate(player.x, player.y);
    let targetAngle = Math.atan2(player.vy, currentSpeed);
    player.angle += (targetAngle - player.angle) * 0.2;
    ctx.rotate(player.angle);
    
    // Outer Glow
    ctx.shadowBlur = 20;
    ctx.shadowColor = varColor('--neon-blue');
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(-12, -12);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-12, 12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name);
}

function gameOver() {
    gameActive = false;
    deathScreen.style.display = 'block';
}

// Start
resize();
initLevel();
reset();

</script>
</body>
</html>
