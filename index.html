<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GUS MACRHODES: ABSOLUTE ZERO</title>
    <style>
        :root {
            --neon-primary: #00ffff;
            --neon-secondary: #ff00ff;
            --bg-deep: #020205;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-deep);
            font-family: 'Orbitron', sans-serif;
        }
        #game-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .header {
            position: absolute;
            top: 30px; left: 40px;
            color: var(--neon-primary);
            text-shadow: 0 0 15px var(--neon-primary);
        }
        #dist-val { font-size: 60px; font-weight: 800; }
        .label { font-size: 12px; letter-spacing: 4px; color: white; opacity: 0.6; }
        
        #death-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .death-card {
            border: 1px solid var(--neon-secondary);
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.2);
        }
        button {
            background: white;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        button:hover {
            background: var(--neon-primary);
            transform: scale(1.1);
        }
        #progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 4px;
            background: var(--neon-primary);
            width: 0%;
            box-shadow: 0 0 10px var(--neon-primary);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-ui">
    <div class="header">
        <div class="label">ENGINE: GUS MACRHODES V3.0</div>
        <div id="dist-val">00000</div>
        <div id="status-text" style="color: var(--neon-secondary);">MODE: CALIBRATING...</div>
    </div>
    <div id="progress-bar"></div>
</div>

<div id="death-overlay">
    <div class="death-card">
        <h1 style="color: var(--neon-secondary); font-size: 50px; margin: 0;">SYSTEM CRITICAL</h1>
        <p style="color: white; opacity: 0.8;">Score captured in the MacRhodes archives.</p>
        <div id="final-score" style="color: var(--neon-primary); font-size: 30px; margin-bottom: 20px;"></div>
        <button onclick="resetGame()">Initiate Reboot</button>
    </div>
</div>

<canvas id="stage"></canvas>

<script>
/** * GUS MACRHODES: ABSOLUTE ZERO ENGINE
 * A fully procedural, high-intensity Wave implementation.
 */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d', { alpha: false });
const distEl = document.getElementById('dist-val');
const statusEl = document.getElementById('status-text');
const progressBar = document.getElementById('progress-bar');
const deathOverlay = document.getElementById('death-overlay');

// Game constants
let W, H;
let frameCount = 0;
let isDead = false;
let distance = 0;

// Difficulty scaling
let gameSpeed = 6;
const MAX_SPEED = 18;
let gapSize = 300;
const MIN_GAP = 135;

// Player Logic
const player = {
    x: 0,
    y: 0,
    vy: 0,
    size: 8, // Precision hitbox
    angle: 0,
    pressed: false,
    trail: [],
    color: '#00ffff'
};

// Procedural Level System
let obstacles = [];
let particles = [];
let decoration = [];
let lastObstacleX = 0;

function init() {
    resize();
    resetGame();
    animate();
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    player.x = W * 0.25;
}

function resetGame() {
    isDead = false;
    distance = 0;
    frameCount = 0;
    gameSpeed = 6;
    gapSize = 320;
    player.y = H / 2;
    player.vy = 0;
    player.trail = [];
    obstacles = [];
    particles = [];
    decoration = [];
    lastObstacleX = W;
    
    deathOverlay.style.display = 'none';
    
    // Initial Level Seed
    for(let i = 0; i < 8; i++) {
        createObstacle(W + (i * 400));
    }
}

function createObstacle(x) {
    const center = Math.random() * (H - 300) + 150;
    const width = 80 + Math.random() * 40;
    
    obstacles.push({
        x: x,
        w: width,
        top: center - (gapSize / 2),
        bottom: center + (gapSize / 2),
        type: Math.random() > 0.8 ? 'hazard' : 'normal',
        hue: Math.random() * 60 + 180
    });
    lastObstacleX = x;
}

// Input Controllers
window.addEventListener('mousedown', () => player.pressed = true);
window.addEventListener('mouseup', () => player.pressed = false);
window.addEventListener('keydown', (e) => { if(e.code === 'Space') player.pressed = true; });
window.addEventListener('keyup', (e) => { if(e.code === 'Space') player.pressed = false; });
window.addEventListener('touchstart', (e) => { e.preventDefault(); player.pressed = true; }, {passive: false});
window.addEventListener('touchend', () => player.pressed = false);

function update() {
    if(isDead) return;

    frameCount++;
    distance += gameSpeed / 10;
    distEl.innerText = Math.floor(distance).toString().padStart(5, '0');

    // Difficulty Ramp
    if (gameSpeed < MAX_SPEED) gameSpeed += 0.0015;
    if (gapSize > MIN_GAP) gapSize -= 0.02;
    
    // Status updates
    if (gameSpeed > 14) statusEl.innerText = "MODE: GODLIKE";
    else if (gameSpeed > 10) statusEl.innerText = "MODE: HYPER-SPEED";
    else statusEl.innerText = "MODE: STABLE";

    // Player Physics
    const accel = 0.7 + (gameSpeed / 40); // Harder to steer at high speed
    if(player.pressed) player.vy -= accel;
    else player.vy += accel;
    
    player.y += player.vy;
    player.angle = Math.atan2(player.vy, gameSpeed);

    // Trail Management
    player.trail.push({ x: player.x, y: player.y });
    player.trail.forEach(p => p.x -= gameSpeed);
    if(player.trail.length > 120) player.trail.shift();

    // Obstacle Logic
    obstacles.forEach(o => {
        o.x -= gameSpeed;

        // Collision Engine (Precision Box)
        if (player.x + player.size > o.x && player.x - player.size < o.x + o.w) {
            if (player.y - player.size < o.top || player.y + player.size > o.bottom) {
                triggerDeath();
            }
        }
    });

    // Infinite Generator
    if(obstacles[0].x < -200) {
        obstacles.shift();
        createObstacle(lastObstacleX + 400 + Math.random() * 50);
    }

    // Border Death
    if(player.y < 0 || player.y > H) triggerDeath();

    // Particle FX
    if(frameCount % 2 === 0) {
        particles.push({
            x: player.x - 10,
            y: player.y,
            vx: -Math.random() * 5,
            vy: (Math.random() - 0.5) * 4,
            life: 1.0
        });
    }
    particles.forEach(p => {
        p.x += p.vx - gameSpeed;
        p.y += p.vy;
        p.life -= 0.02;
    });
    particles = particles.filter(p => p.life > 0);
}

function draw() {
    // 1. Background Layer
    ctx.fillStyle = '#020205';
    ctx.fillRect(0, 0, W, H);
    
    // Parallax Grid
